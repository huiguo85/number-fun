<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Number Fun</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: #FFF9F0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .phone {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      gap: 16px;
      transition: opacity 0.3s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }
    .hidden { display: none !important; }

    /* ── DIFFICULTY SCREEN ── */
    #difficulty { background: linear-gradient(160deg, #E8D5FF 0%, #C9A7FF 100%); }

    .diff-title {
      font-size: 42px;
      font-weight: 900;
      color: #5B0FA8;
      text-shadow: 3px 3px 0 #E0C0FF, 5px 5px 0 rgba(0,0,0,0.08);
      text-align: center;
      line-height: 1.15;
    }

    .diff-mascot { width: 120px; height: 120px; animation: bounce 2s infinite ease-in-out; }
    .diff-mascot svg { width: 100%; height: 100%; }

    .diff-buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    .diff-btn {
      width: 100%; height: 88px;
      border-radius: 28px; border: 3.5px solid #222;
      cursor: pointer; box-shadow: 0 7px 0 rgba(0,0,0,0.18);
      display: flex; align-items: center; gap: 18px; padding: 0 22px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .diff-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(0,0,0,0.18); }
    .diff-btn svg { width: 50px; height: 50px; flex-shrink: 0; }
    .diff-btn-easy   { background: #06D6A0; }
    .diff-btn-medium { background: #FFD166; }
    .diff-btn-hard   { background: #EF476F; }

    .diff-btn-text { display: flex; flex-direction: column; gap: 2px; }
    .diff-btn-name  { font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 rgba(0,0,0,0.18); }
    .diff-btn-desc  { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.88); }

    /* ── HOME SCREEN ── */
    #home { background: linear-gradient(160deg, #FFECD2 0%, #FCB69F 100%); justify-content: flex-start; padding-top: 24px; }

    .home-topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 4px;
    }

    .shop-btn {
      display: flex; align-items: center; gap: 7px;
      background: white; border: 3px solid #222; border-radius: 22px;
      padding: 9px 16px; cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15);
      font-family: inherit; font-size: 15px; font-weight: 900; color: #444;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .shop-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
    .shop-btn svg { width: 22px; height: 22px; }
    .shop-star-count {
      background: #FFD166; border: 2px solid #222; border-radius: 12px;
      padding: 2px 8px; font-size: 13px; font-weight: 900; color: #333;
    }

    .shop-btn.locked { opacity: 0.6; }
    @keyframes jiggle {
      0%,100% { transform: rotate(0deg); }
      20% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      60% { transform: rotate(-5deg); }
      80% { transform: rotate(5deg); }
    }
    .shop-btn.jiggling { animation: jiggle 0.4s ease; }

    .app-title {
      font-size: 48px; font-weight: 900; color: #FF6B35;
      text-shadow: 4px 4px 0 #FFD166, 6px 6px 0 rgba(0,0,0,0.08);
      letter-spacing: 2px;
    }

    .home-avatar { width: 148px; height: 148px; animation: bounce 2s infinite ease-in-out; }
    .home-avatar svg { width: 100%; height: 100%; }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-16px); }
    }

    .diff-pill {
      background: rgba(255,255,255,0.55); border: 2.5px solid #222;
      border-radius: 20px; padding: 6px 16px;
      font-size: 14px; font-weight: 800; color: #444;
      cursor: pointer; font-family: inherit;
    }
    .diff-pill:active { opacity: 0.7; }

    .subtitle { font-size: 20px; font-weight: 700; color: #7B3F00; }

    .home-buttons { display: flex; gap: 20px; }

    .mode-btn {
      width: 135px; height: 135px; border-radius: 36px; border: 3.5px solid #222;
      cursor: pointer; box-shadow: 0 8px 0 rgba(0,0,0,0.18);
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; font-family: inherit;
    }
    .mode-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 rgba(0,0,0,0.18); }
    .mode-btn svg { width: 60px; height: 60px; }
    .btn-add { background: #06D6A0; }
    .btn-sub { background: #EF476F; }
    .mode-label { font-size: 15px; font-weight: 900; color: white; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }

    /* ── SHOP SCREEN ── */
    #shop { background: linear-gradient(160deg, #FFF8E1 0%, #FFD54F 100%); justify-content: flex-start; padding-top: 28px; gap: 10px; overflow-y: auto; }

    .shop-header {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
    }

    .back-pill {
      display: flex; align-items: center; gap: 6px;
      background: white; border: 3px solid #222; border-radius: 18px;
      padding: 8px 14px; cursor: pointer; font-family: inherit;
      font-size: 15px; font-weight: 800; color: #444;
      box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    }
    .back-pill:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
    .back-pill svg { width: 18px; height: 18px; }

    .shop-stars-badge {
      background: #FFD166; border: 3px solid #222; border-radius: 20px;
      padding: 8px 16px; font-size: 16px; font-weight: 900; color: #333;
      box-shadow: 0 5px 0 rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 5px;
    }
    .shop-stars-badge svg { width: 20px; height: 20px; }

    .shop-title {
      font-size: 34px; font-weight: 900; color: #7B4F00;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
    }

    .shop-subtitle { font-size: 16px; font-weight: 700; color: #9E6700; }

    .shop-tabs {
      display: flex; gap: 8px; width: 100%;
    }
    .shop-tab {
      flex: 1; padding: 10px 0; border-radius: 18px; border: 3px solid #222;
      font-family: inherit; font-size: 16px; font-weight: 900; cursor: pointer;
      background: white; color: #666; box-shadow: 0 4px 0 rgba(0,0,0,0.13);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .shop-tab.active { background: #FF9900; color: white; box-shadow: 0 4px 0 #c47000; }
    .shop-tab:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.13); }

    .acc-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%;
    }
    .acc-card {
      background: white; border: 3.5px solid #222; border-radius: 18px;
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 8px; gap: 4px; cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.13);
      transition: transform 0.1s, box-shadow 0.1s; position: relative;
    }
    .acc-card:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.13); }
    .acc-card.selected { border-color: #06D6A0; box-shadow: 0 0 0 3px #06D6A0, 0 5px 0 #04A57E; background: #F0FFF9; }
    .acc-card.locked { opacity: 0.7; cursor: default; }
    .acc-card svg { width: 64px; height: 64px; }
    .acc-name { font-size: 12px; font-weight: 900; color: #444; text-align: center; }
    .acc-cost { font-size: 11px; font-weight: 800; color: #FF9900; }
    .acc-owned { font-size: 11px; font-weight: 800; color: #06D6A0; }
    .acc-lock { position: absolute; top: 4px; right: 6px; font-size: 14px; }

    .home-avatar { position: relative; }
    .diff-mascot  { position: relative; }
    .acc-overlay { position: absolute; inset: 0; pointer-events: none; }
    .acc-overlay svg { width: 100%; height: 100%; }

    .shop-timer {
      background: white; border: 3.5px solid #222; border-radius: 20px;
      padding: 10px 22px; font-size: 22px; font-weight: 900; color: #333;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15);
      display: flex; align-items: center; gap: 8px;
    }
    .shop-timer.urgent { background: #FF6B6B; color: white; animation: timerPulse 0.5s ease infinite alternate; }
    @keyframes timerPulse { from { transform: scale(1); } to { transform: scale(1.07); } }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
    }

    .avatar-card {
      background: white; border: 3.5px solid #222; border-radius: 22px;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px 10px; gap: 6px;
      cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.13);
      transition: transform 0.1s, box-shadow 0.1s;
      position: relative;
    }
    .avatar-card:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.13); }
    .avatar-card.selected {
      border-color: #06D6A0;
      box-shadow: 0 0 0 3px #06D6A0, 0 5px 0 #04A57E;
      background: #F0FFF9;
    }
    .avatar-card svg { width: 72px; height: 72px; }
    .avatar-name { font-size: 13px; font-weight: 900; color: #444; }

    .selected-badge {
      position: absolute; top: -10px; right: -10px;
      width: 26px; height: 26px; background: #06D6A0;
      border: 2.5px solid #222; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: white;
    }

    /* ── WEEKLY GOAL ── */
    .goal-btn {
      width: 100%; padding: 12px 18px; border-radius: 22px; border: 3px solid #222;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; font-family: inherit; font-size: 16px; font-weight: 900;
      cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .goal-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
    .goal-btn-left { display: flex; align-items: center; gap: 8px; }
    .goal-btn-label { font-size: 13px; opacity: 0.85; }

    .goal-progress-bar-wrap {
      flex: 1; height: 10px; background: rgba(255,255,255,0.3);
      border-radius: 6px; overflow: hidden; min-width: 60px;
    }
    .goal-progress-bar-fill {
      height: 100%; background: #FFD166; border-radius: 6px;
      transition: width 0.4s ease;
    }

    /* popup overlay */
    .goal-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; border-radius: 40px;
    }
    .goal-popup {
      background: white; border: 4px solid #222; border-radius: 28px;
      padding: 22px 18px; width: 320px;
      box-shadow: 0 12px 0 rgba(0,0,0,0.18);
      display: flex; flex-direction: column; gap: 14px;
    }
    .goal-popup-title { font-size: 26px; font-weight: 900; color: #5B0FA8; text-align: center; }
    .goal-card {
      border: 3px solid #DDD; border-radius: 18px; padding: 12px 14px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column; gap: 4px;
    }
    .goal-card:hover { border-color: #764ba2; background: #F5F0FF; }
    .goal-card.chosen { border-color: #764ba2; background: #EEE6FF; box-shadow: 0 0 0 2px #764ba2; }
    .goal-card-top { display: flex; justify-content: space-between; align-items: center; }
    .goal-card-name { font-size: 15px; font-weight: 900; color: #333; }
    .goal-card-reward { font-size: 14px; font-weight: 900; color: #FF9900; }
    .goal-card-desc { font-size: 12px; color: #777; font-weight: 700; }
    .goal-start-btn {
      width: 100%; padding: 14px; border-radius: 18px; border: 3px solid #222;
      background: linear-gradient(135deg, #667eea, #764ba2); color: white;
      font-family: inherit; font-size: 18px; font-weight: 900; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: transform 0.1s, box-shadow 0.1s;
    }
    .goal-start-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
    .goal-close-btn {
      background: none; border: none; font-size: 22px; cursor: pointer;
      position: absolute; top: 14px; right: 18px;
    }

    .prize-btn {
      width: 100%; padding: 16px; border-radius: 22px; border: 3px solid #222;
      background: linear-gradient(135deg, #FFD700, #FF9900);
      color: white; font-family: inherit; font-size: 20px; font-weight: 900;
      cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      animation: prizePulse 0.8s ease infinite alternate;
    }
    @keyframes prizePulse {
      from { transform: scale(1);    box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
      to   { transform: scale(1.04); box-shadow: 0 8px 0 rgba(0,0,0,0.25); }
    }

    .glitch-overlay {
      position: absolute; inset: 0; z-index: 200; border-radius: 40px;
      background-size: 24px 24px; image-rendering: pixelated;
      cursor: pointer;
    }

    /* ── PROBLEM SCREEN ── */
    #problem {
      background: linear-gradient(160deg, #E0F4FF 0%, #B3E5FC 100%);
      justify-content: space-between; padding: 28px 20px 20px;
    }

    .top-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; }

    .back-btn {
      background: white; border: 3px solid #222; border-radius: 18px;
      padding: 8px 14px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 6px;
      font-size: 15px; font-weight: 800; color: #444; font-family: inherit;
    }
    .back-btn svg { width: 28px; height: 26px; }
    .back-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

    .score-badge {
      background: #FFD166; border: 3px solid #222; border-radius: 22px;
      padding: 8px 18px; font-size: 20px; font-weight: 900; color: #333;
      box-shadow: 0 5px 0 rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 6px;
    }
    .score-badge svg { width: 24px; height: 24px; }

    .problem-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; width: 100%;
    }

    .objects-row { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; justify-content: center; }
    .object-group { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; max-width: 128px; }

    .obj {
      width: 40px; height: 40px; animation: popIn 0.3s ease both;
      user-select: none; display: flex; align-items: center; justify-content: center;
    }
    .obj svg { width: 100%; height: 100%; }

    .num-display {
      font-size: 64px; font-weight: 900; color: #1565C0;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      animation: popIn 0.3s ease both; min-width: 80px; text-align: center;
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-15deg); }
      70%  { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .operator-sign {
      width: 68px; height: 68px; border-radius: 20px; border: 3.5px solid #222;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15); flex-shrink: 0;
    }
    .operator-sign svg { width: 42px; height: 42px; }
    .op-add { background: #06D6A0; }
    .op-sub { background: #EF476F; }

    .equals-row { display: flex; align-items: center; gap: 18px; }

    .equals-sign {
      width: 60px; height: 60px; background: white;
      border: 3.5px solid #222; border-radius: 18px;
      box-shadow: 0 5px 0 rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .equals-sign svg { width: 36px; height: 36px; }

    .answer-box {
      width: 96px; height: 96px; background: white; border-radius: 24px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 46px; font-weight: 900; color: #aaa; border: 4px dashed #ccc;
    }
    .answer-box.filled { border: 4px solid #06D6A0; color: #06D6A0; }

    .answer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; padding: 0 4px; }

    .ans-btn {
      aspect-ratio: 1; border-radius: 20px; border: 3px solid #222;
      font-size: 24px; font-weight: 900; cursor: pointer;
      background: white; color: #444; font-family: inherit;
      box-shadow: 0 6px 0 rgba(0,0,0,0.14); transition: transform 0.1s, box-shadow 0.1s;
    }
    .ans-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.14); }
    .ans-btn.correct { background: #06D6A0; color: white; border-color: #04A57E; }
    .ans-btn.wrong   { background: #EF476F; color: white; border-color: #C02050; }

    /* Number-pad (medium & hard) */
    .numpad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; width: 100%; padding: 0 4px;
    }
    .np-btn {
      height: 68px; border-radius: 20px; border: 3px solid #222;
      font-size: 28px; font-weight: 900; cursor: pointer;
      background: white; color: #444; font-family: inherit;
      box-shadow: 0 6px 0 rgba(0,0,0,0.14); transition: transform 0.1s, box-shadow 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .np-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.14); }
    .np-btn.np-back { font-size: 24px; background: #FFD166; }
    .np-btn.np-check { background: #06D6A0; color: white; border-color: #04A57E; font-size: 30px; }
    .np-btn.np-check:disabled { background: #ccc; border-color: #aaa; color: #fff; box-shadow: none; }
    .answer-box.typing { border: 4px solid #7BCFFF; color: #333; font-size: 44px; }
    .answer-box.typing-done { border: 4px solid #06D6A0; color: #06D6A0; }

    /* ── FEEDBACK SCREEN ── */
    #feedback { justify-content: center; gap: 18px; }
    #feedback.correct-bg { background: linear-gradient(160deg, #D4F7E7 0%, #06D6A0 100%); }
    #feedback.wrong-bg   { background: linear-gradient(160deg, #FFE0E6 0%, #EF476F 100%); }

    .feedback-mascot { width: 190px; height: 190px; animation: celebrate 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .feedback-mascot svg { width: 100%; height: 100%; }

    @keyframes celebrate {
      0%   { transform: scale(0) rotate(-25deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .feedback-text { font-size: 46px; font-weight: 900; color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.18); text-align: center; }

    .fb-icons { display: flex; gap: 12px; animation: pulse 1s infinite; }
    .fb-icons svg { width: 54px; height: 54px; }

    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

    .confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .confetti-piece {
      position: absolute; width: 13px; height: 13px; border-radius: 3px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(900px) rotate(720deg); opacity: 0; }
    }

    @media (max-height: 860px) { .phone { transform: scale(0.9); transform-origin: center; } }
    @media (max-height: 780px) { .phone { transform: scale(0.8); transform-origin: center; } }
  </style>
</head>
<body>
<div class="phone">

  <!-- DIFFICULTY SCREEN -->
  <div class="screen" id="difficulty">
    <div class="diff-title">How hard<br>do you want?</div>
    <div class="diff-mascot" id="diff-mascot-el"></div>
    <div class="diff-buttons">
      <button class="diff-btn diff-btn-easy" onclick="setDifficulty('easy')">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="13" fill="white"/>
          <line x1="26" y1="4"  x2="26" y2="11" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="26" y1="41" x2="26" y2="48" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="4"  y1="26" x2="11" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="41" y1="26" x2="48" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="9"  y1="9"  x2="14" y2="14" stroke="white" stroke-width="3"   stroke-linecap="round"/>

  const DIFF_CONFIG = {
    easy:   { maxAnswer: 9,   distractorStep: 1 },

  const SHOP_COST = 10;

  let difficulty     = 'easy';

  /* ════════════════════════════════
     INIT
  ════════════════════════════════ */
  function init() {
    refreshAvatarDisplays();
    updateShopBtn();
    updateGoalUI();
    setupGlitchHold();
  }

  function refreshAvatarDisplays() {
    const avatarSvg = AVATARS[currentAvatarIdx].svg;
    const accSvg = currentAccIdx >= 0 ? `<div class="acc-overlay">${ACCESSORIES[currentAccIdx].svg}</div>` : '';
    document.getElementById('home-avatar-el').innerHTML = avatarSvg + accSvg;
    document.getElementById('diff-mascot-el').innerHTML = avatarSvg + accSvg;
  }

  function updateShopBtn() {
    document.getElementById('shop-star-count').textContent = '⭐ ' + totalStars;
    document.getElementById('shop-total-stars').textContent = totalStars;
  }

  /* ════════════════════════════════
     SHOP
  ════════════════════════════════ */
  let shopTimerInterval = null;

  function startShopTimer() {
    clearInterval(shopTimerInterval);
    let secondsLeft = 60;
    const timerEl = document.getElementById('shop-timer');
    const textEl = document.getElementById('shop-timer-text');
    timerEl.classList.remove('urgent');
    textEl.textContent = '1:00';

    shopTimerInterval = setInterval(() => {
      secondsLeft--;
      const mins = Math.floor(secondsLeft / 60);
      const secs = secondsLeft % 60;
      textEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      if (secondsLeft <= 10) timerEl.classList.add('urgent');
      if (secondsLeft <= 0) {
        clearInterval(shopTimerInterval);
        shopTimerInterval = null;
        showScreen('home');
      }
    }, 1000);
  }

  function stopShopTimer() {
    clearInterval(shopTimerInterval);
    shopTimerInterval = null;
  }

  function tryOpenShop() {
    if (totalStars < SHOP_COST) {
      const btn = document.getElementById('shop-btn');
      btn.classList.remove('jiggling');
      void btn.offsetWidth; // reflow to restart animation
      btn.classList.add('jiggling');
      btn.addEventListener('animationend', () => btn.classList.remove('jiggling'), { once: true });

      // Briefly show "need X more" on the badge
      const badge = document.getElementById('shop-star-count');
      const orig  = badge.textContent;
      badge.textContent = `Need ${SHOP_COST - totalStars} more!`;
      setTimeout(() => badge.textContent = orig, 1400);
      return;
    }
    renderShop();
    showScreen('shop');
    startShopTimer();
  }

  function renderShop() {
    document.getElementById('shop-total-stars').textContent = totalStars;
    switchShopTab(currentShopTab);
  }

  function switchShopTab(tab) {
    currentShopTab = tab;
    document.getElementById('tab-buddies').classList.toggle('active', tab === 'buddies');
    document.getElementById('tab-gear').classList.toggle('active', tab === 'gear');
    document.getElementById('avatar-grid').classList.toggle('hidden', tab !== 'buddies');
    document.getElementById('acc-grid').classList.toggle('hidden', tab !== 'gear');
    if (tab === 'buddies') renderAvatarGrid();
    else renderAccGrid();
  }

  function renderAvatarGrid() {
    const grid = document.getElementById('avatar-grid');
    grid.innerHTML = '';
    AVATARS.forEach((av, idx) => {
      const card = document.createElement('div');
      card.className = 'avatar-card' + (idx === currentAvatarIdx ? ' selected' : '');
      card.innerHTML = av.svg + `<span class="avatar-name">${av.name}</span>`;
      if (idx === currentAvatarIdx) {
        const badge = document.createElement('div');
        badge.className = 'selected-badge';
        badge.textContent = '✓';
        card.appendChild(badge);
      }
      card.onclick = () => selectAvatar(idx);
      grid.appendChild(card);
    });
  }

  function renderAccGrid() {
    const grid = document.getElementById('acc-grid');
    grid.innerHTML = '';
    ACCESSORIES.forEach((acc, idx) => {
      const owned = ownedAccs.has(idx);
      const selected = idx === currentAccIdx;
      const card = document.createElement('div');
      card.className = 'acc-card' + (selected ? ' selected' : '') + (owned ? '' : ' locked');
      card.innerHTML = acc.svg +
        `<span class="acc-name">${acc.name}</span>` +
        (owned
          ? `<span class="acc-owned">${selected ? '✓ On' : 'Owned'}</span>`
          : `<span class="acc-cost">⭐ ${acc.cost}</span><span class="acc-lock">🔒</span>`);
      card.onclick = () => owned ? selectAccessory(idx) : buyAccessory(idx);
      grid.appendChild(card);
    });
  }

  function buyAccessory(idx) {
    const acc = ACCESSORIES[idx];
    if (totalStars < acc.cost) {
      const card = document.getElementById('acc-grid').children[idx];
      card.style.animation = 'none';
      void card.offsetWidth;
      card.style.animation = 'timerPulse 0.2s ease 3 alternate';
      return;
    }
    totalStars -= acc.cost;
    localStorage.setItem('totalStars', totalStars);
    ownedAccs.add(idx);
    localStorage.setItem('ownedAccs', JSON.stringify([...ownedAccs]));
    selectAccessory(idx);
  }

  function selectAccessory(idx) {
    currentAccIdx = (currentAccIdx === idx) ? -1 : idx;
    localStorage.setItem('accIdx', currentAccIdx);
    refreshAvatarDisplays();
    renderAccGrid();
    document.getElementById('shop-total-stars').textContent = totalStars;
  }

  function selectAvatar(idx) {
    currentAvatarIdx = idx;
    localStorage.setItem('avatarIdx', idx);
    refreshAvatarDisplays();
    renderAvatarGrid();
  }

  /* ════════════════════════════════
     WEEKLY GOALS
  ════════════════════════════════ */
  const GOALS = [
    { name: '25 Correct',   desc: 'Answer 25 questions right',         target: 25, reward: 50,  type: 'total'  },
    { name: '50 Correct',   desc: 'Answer 50 questions right',         target: 50, reward: 100, type: 'total'  },
    { name: '50 in a Row!', desc: 'Get 50 right in a row (no misses)', target: 50, reward: 250, type: 'streak' },
  ];

  function getWeekKey() {
    const d = new Date();
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${week}`;
  }

  let activeGoalIdx   = parseInt(localStorage.getItem('activeGoalIdx')  || '-1');
  let goalProgress    = parseInt(localStorage.getItem('goalProgress')    || '0');
  let goalWeekKey     = localStorage.getItem('goalWeekKey')              || '';
  let goalPrizeReady  = localStorage.getItem('goalPrizeReady') === 'true';
  let chosenGoalIdx   = -1;

  // Reset on new week (keep prize if uncollected, otherwise full reset)
  (function checkWeekReset() {
    const cur = getWeekKey();
    if (goalWeekKey && goalWeekKey !== cur) {
      if (!goalPrizeReady) {
        // No pending prize — full reset so a new goal can be picked
        activeGoalIdx = -1; goalProgress = 0; goalWeekKey = '';
        localStorage.setItem('activeGoalIdx', -1);
        localStorage.setItem('goalProgress',  0);
        localStorage.setItem('goalWeekKey',   '');
      }
      // If goalPrizeReady is true, keep state so they can still collect last week's prize
    }
  })();

  function openGoalPopup() {
    const container = document.getElementById('goal-cards');
    const startBtn  = document.getElementById('goal-start-btn');
    container.innerHTML = '';

    if (goalPrizeReady) {
      // Show "claim your prize" view
      const g = GOALS[activeGoalIdx];
      container.innerHTML = `
        <div style="text-align:center;padding:10px 0;">
          <div style="font-size:48px">🏆</div>
          <div style="font-size:18px;font-weight:900;color:#333;margin:8px 0">${g.name} complete!</div>
          <div style="font-size:14px;color:#777">Your reward: <strong style="color:#FF9900">⭐ ${g.reward} stars</strong></div>
        </div>`;
      startBtn.textContent = '🎁 Collect Prize!';
      startBtn.onclick = collectPrize;
    } else if (goalWeekKey === getWeekKey() && activeGoalIdx < 0) {
      // Prize already collected this week — no more goals until next week
      container.innerHTML = `
        <div style="text-align:center;padding:16px 0;">
          <div style="font-size:52px">🌟</div>
          <div style="font-size:17px;font-weight:900;color:#333;margin:10px 0">Goal done for this week!</div>
          <div style="font-size:13px;color:#777;line-height:1.5">You already completed your goal.<br>Come back next week for a new one!</div>
        </div>`;
      startBtn.textContent = '👍 OK!';
      startBtn.onclick = () => document.getElementById('goal-overlay').classList.add('hidden');
    } else if (activeGoalIdx >= 0 && goalWeekKey === getWeekKey()) {
      // Goal in progress — read-only view
      GOALS.forEach((gl, i) => {
        const card = document.createElement('div');
        card.className = 'goal-card' + (i === activeGoalIdx ? ' chosen' : '');
        card.style.pointerEvents = 'none';
        card.innerHTML = `
          <div class="goal-card-top">
            <span class="goal-card-name">${gl.name}</span>
            <span class="goal-card-reward">⭐ ${gl.reward}</span>
          </div>
          <div class="goal-card-desc">${gl.desc}${i === activeGoalIdx ? ` — ${goalProgress}/${gl.target}` : ''}</div>`;
        container.appendChild(card);
      });
      startBtn.textContent = '⏳ In Progress…';
      startBtn.onclick = () => document.getElementById('goal-overlay').classList.add('hidden');
    } else {
      // New week — pick a goal
      chosenGoalIdx = -1;
      GOALS.forEach((g, i) => {
        const card = document.createElement('div');
        card.className = 'goal-card';
        card.innerHTML = `
          <div class="goal-card-top">
            <span class="goal-card-name">${g.name}</span>
            <span class="goal-card-reward">⭐ ${g.reward}</span>
          </div>
          <div class="goal-card-desc">${g.desc}</div>`;
        card.onclick = () => {
          chosenGoalIdx = i;
          document.querySelectorAll('.goal-card').forEach((c, j) =>
            c.classList.toggle('chosen', j === i));
        };
        container.appendChild(card);
      });
      startBtn.textContent = "Let's Go!";
      startBtn.onclick = startGoal;
    }
    document.getElementById('goal-overlay').classList.remove('hidden');
  }

  function closeGoalPopup(e) {
    if (e.target === document.getElementById('goal-overlay'))
      document.getElementById('goal-overlay').classList.add('hidden');
  }

  function startGoal() {
    if (chosenGoalIdx < 0) return;
    activeGoalIdx = chosenGoalIdx;
    goalProgress  = 0;
    goalWeekKey   = getWeekKey();
    goalPrizeReady = false;
    localStorage.setItem('activeGoalIdx',  activeGoalIdx);
    localStorage.setItem('goalProgress',   goalProgress);
    localStorage.setItem('goalWeekKey',    goalWeekKey);
    localStorage.setItem('goalPrizeReady', 'false');
    document.getElementById('goal-overlay').classList.add('hidden');
    updateGoalUI();
  }

  function collectPrize() {
    const reward = GOALS[activeGoalIdx].reward;
    totalStars += reward;
    localStorage.setItem('totalStars', totalStars);
    updateShopBtn();
    goalPrizeReady = false;
    activeGoalIdx  = -1;
    goalProgress   = 0;
    localStorage.setItem('goalPrizeReady', 'false');
    localStorage.setItem('activeGoalIdx',  -1);
    localStorage.setItem('goalProgress',   0);
    document.getElementById('goal-overlay').classList.add('hidden');
    updateGoalUI();
    spawnConfetti();
  }

  function recordCorrect() {
    if (activeGoalIdx < 0 || goalPrizeReady) return;
    goalProgress++;
    localStorage.setItem('goalProgress', goalProgress);
    updateGoalUI();
    if (goalProgress >= GOALS[activeGoalIdx].target) completeGoal();
  }

  function recordWrong() {
    if (activeGoalIdx < 0 || goalPrizeReady) return;
    if (GOALS[activeGoalIdx].type === 'streak') {
      goalProgress = 0;
      localStorage.setItem('goalProgress', goalProgress);
      updateGoalUI();
    }
  }

  function completeGoal() {
    goalPrizeReady = true;
    localStorage.setItem('goalPrizeReady', 'true');
    updateGoalUI();
  }

  function updateGoalUI() {
    const label = document.getElementById('goal-btn-label');
    const wrap  = document.getElementById('goal-bar-wrap');
    const fill  = document.getElementById('goal-bar-fill');
    const prize = document.getElementById('prize-btn');

    if (goalPrizeReady) {
      label.textContent  = GOALS[activeGoalIdx].name + ' ✅';
      wrap.style.display = 'none';
      prize.classList.remove('hidden');
    } else if (activeGoalIdx >= 0) {
      const goal = GOALS[activeGoalIdx];
      label.textContent  = goal.name;
      wrap.style.display = 'block';
      fill.style.width   = Math.min(100, Math.round(goalProgress / goal.target * 100)) + '%';
      prize.classList.add('hidden');
    } else {
      label.textContent  = 'Tap to choose a goal!';
      wrap.style.display = 'none';
      prize.classList.add('hidden');
    }
  }

  /* ════════════════════════════════
     GLITCH EASTER EGG
  ════════════════════════════════ */
  let glitchHoldTimer   = null;
  let glitchAnimFrame   = null;

  function setupGlitchHold() {
    const el = document.getElementById('home-avatar-el');
    const start = () => {
      glitchHoldTimer = setTimeout(triggerGlitch, 30000);
    };
    const cancel = () => clearTimeout(glitchHoldTimer);
    el.addEventListener('pointerdown',   start);
    el.addEventListener('pointerup',     cancel);
    el.addEventListener('pointerleave',  cancel);
    el.addEventListener('pointercancel', cancel);
  }

  function makeGlitchFrame() {
    const canvas = document.createElement('canvas');
    canvas.width = 24; canvas.height = 24;
    const ctx = canvas.getContext('2d');
    const palette = ['#000000','#0a0014','#1a0033','#2d0060','#4400aa',
                     '#6600ff','#8800ff','#000022','#110022','#220044'];
    for (let x = 0; x < 24; x++)
      for (let y = 0; y < 24; y++) {
        ctx.fillStyle = palette[Math.floor(Math.random() * palette.length)];
        ctx.fillRect(x, y, 1, 1);
      }
    return canvas.toDataURL();
  }

  function triggerGlitch() {
    const overlay = document.getElementById('glitch-overlay');
    overlay.classList.remove('hidden');
    const animate = () => {
      overlay.style.backgroundImage = `url(${makeGlitchFrame()})`;
      glitchAnimFrame = requestAnimationFrame(animate);
    };
    animate();
  }

  function dismissGlitch() {
    document.getElementById('glitch-overlay').classList.add('hidden');
    cancelAnimationFrame(glitchAnimFrame);
    glitchAnimFrame = null;
  }

  /* ════════════════════════════════
     GAME FLOW
  ════════════════════════════════ */
  function setDifficulty(d) {
    difficulty = d;
    showScreen('home');
  }

  function startGame(m) {
    mode  = m;
    score = 0;
    document.getElementById('score').textContent = score;
    showScreen('problem');
    nextQuestion();
  }

  function nextQuestion() {
    isProcessing   = false;
    currentCartoon = CARTOONS[Math.floor(Math.random() * CARTOONS.length)];

    const cfg = DIFF_CONFIG[difficulty];
    const max = cfg.maxAnswer;
    let a, b;

    if (mode === 'add') {
      a = randInt(1, max - 1);
      b = randInt(1, max - a);
      correctAnswer = a + b;
    } else {
      a = randInt(2, max);
      b = randInt(1, a - 1);
      correctAnswer = a - b;
    }

    // Update operator
    const opEl = document.getElementById('op-sign');
    opEl.className = 'operator-sign ' + (mode === 'add' ? 'op-add' : 'op-sub');
    opEl.innerHTML = mode === 'add' ? SVG_PLUS : SVG_MINUS;

    // Update groups (never rebuild objects-row structure)
    const gA = document.getElementById('group-a');
    const gB = document.getElementById('group-b');
    if (difficulty === 'easy') {
      renderGroup('group-a', a);
      renderGroup('group-b', b);
    } else {
      gA.innerHTML = `<div class="num-display">${a}</div>`;
      gB.innerHTML = `<div class="num-display">${b}</div>`;
    }

    const box = document.getElementById('answer-box');
    box.textContent = '?';
    box.className   = 'answer-box';

    if (difficulty === 'easy') {
      document.getElementById('answer-grid').classList.remove('hidden');
      document.getElementById('numpad').classList.add('hidden');
      buildAnswerGrid(correctAnswer, cfg.distractorStep, max);
    } else {
      document.getElementById('answer-grid').classList.add('hidden');
      document.getElementById('numpad').classList.remove('hidden');
      buildNumpad();
    }
  }

  function renderGroup(id, count) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const div = document.createElement('div');
      div.className = 'obj';
      div.innerHTML = currentCartoon;
      div.style.animationDelay = (i * 0.06) + 's';
      el.appendChild(div);
    }
  }

  function buildAnswerGrid(correct, step, max) {
    const grid = document.getElementById('answer-grid');
    grid.innerHTML = '';

    const opts = new Set([correct]);
    for (let delta = step; delta <= max + step * 2 && opts.size < 6; delta += step) {
      if (correct - delta >= 0)   opts.add(correct - delta);
      if (correct + delta <= max) opts.add(correct + delta);
    }

    const arr = shuffle([...opts]).slice(0, 5);
    if (!arr.includes(correct)) arr[arr.length - 1] = correct;

    arr.forEach(n => {
      const btn = document.createElement('button');
      btn.className  = 'ans-btn';
      btn.textContent = n;
      btn.onclick    = () => checkAnswer(n, btn);
      grid.appendChild(btn);
    });
  }

  let typedAnswer = '';

  function buildNumpad() {
    typedAnswer = '';
    const pad = document.getElementById('numpad');
    pad.innerHTML = '';
    const keys = ['1','2','3','4','5','6','7','8','9','←','0','✓'];
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.textContent = k;
      btn.className = 'np-btn' +
        (k === '←' ? ' np-back' : '') +
        (k === '✓' ? ' np-check' : '');
      if (k === '✓') btn.id = 'np-check-btn';
      btn.addEventListener('click', () => numpadPress(k));
      pad.appendChild(btn);
    });
    updateNumpadDisplay();
  }

  function numpadPress(key) {
    if (isProcessing) return;
    const box = document.getElementById('answer-box');
    const maxLen = difficulty === 'hard' ? 3 : 2;
    if (key === '←') {
      typedAnswer = typedAnswer.slice(0, -1);
    } else if (key === '✓') {
      if (!typedAnswer) return;
      checkAnswer(parseInt(typedAnswer), null);
      return;
    } else {
      if (typedAnswer.length >= maxLen) return;
      // prevent leading zeros
      if (typedAnswer === '0') return;
      typedAnswer += key;
    }
    updateNumpadDisplay();
  }

  function updateNumpadDisplay() {
    const box     = document.getElementById('answer-box');
    const checkBtn = document.getElementById('np-check-btn');
    box.textContent = typedAnswer || '?';
    box.className   = typedAnswer ? 'answer-box typing' : 'answer-box';
    if (checkBtn) checkBtn.disabled = !typedAnswer;
  }

  function checkAnswer(chosen, btn) {
    if (isProcessing) return;
    isProcessing = true;
    document.querySelectorAll('.ans-btn').forEach(b => b.onclick = null);

    const box = document.getElementById('answer-box');
    box.textContent = chosen;

    const isNumpad = (btn === null);

    if (chosen === correctAnswer) {
      if (!isNumpad) btn.className = 'ans-btn correct';
      box.className = 'answer-box filled';
      if (isNumpad) {
        // Flash the check button green
        const cb = document.getElementById('np-check-btn');
        if (cb) { cb.style.background = '#06D6A0'; cb.style.transform = 'scale(1.1)'; }
      }
      score++;
      totalStars++;
      localStorage.setItem('totalStars', totalStars);
      document.getElementById('score').textContent = score;
      updateShopBtn();
      recordCorrect();
      setTimeout(() => showFeedback(true), 400);
    } else {
      if (!isNumpad) {
        btn.className = 'ans-btn wrong';
        document.querySelectorAll('.ans-btn').forEach(b => {
          if (parseInt(b.textContent) === correctAnswer) b.className = 'ans-btn correct';
        });
      } else {
        // Flash box red, briefly show correct answer
        box.className = 'answer-box wrong-flash';
        box.style.cssText += ';background:#EF476F;color:white;border-color:#C02050';
        setTimeout(() => {
          box.textContent = correctAnswer;
          box.style.cssText = '';
          box.className = 'answer-box filled';
        }, 500);
      }
      recordWrong();
      setTimeout(() => showFeedback(false), 800);
    }
  }

  function showFeedback(correct) {
    const fb = document.getElementById('feedback');
    fb.className = 'screen ' + (correct ? 'correct-bg' : 'wrong-bg');
    document.getElementById('fb-mascot').innerHTML = correct ? SVG_HAPPY : SVG_SAD;
    document.getElementById('fb-text').textContent  = correct ? 'Amazing!' : 'Try again!';
    document.getElementById('fb-icons').innerHTML   = correct
      ? SVG_STAR + SVG_STAR + SVG_STAR
      : SVG_HEART + SVG_HEART + SVG_HEART;

    if (correct) spawnConfetti();
    else document.getElementById('confetti').innerHTML = '';

    showScreen('feedback');
    setTimeout(() => { showScreen('problem'); nextQuestion(); }, correct ? 2200 : 1900);
  }

  function goBack() { showScreen('home'); }

  function showScreen(id) {
    ['difficulty','home','shop','problem','feedback'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#FFD166','#EF476F','#06D6A0','#118AB2','#FFB347','#A8DADC','#FF88CC'];
    for (let i = 0; i < 44; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + '%';
      el.style.top  = '-20px';
      el.style.background        = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1 + Math.random() * 1.5) + 's';
      el.style.animationDelay    = (Math.random() * 0.5) + 's';
      container.appendChild(el);
    }
  }

  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  init();
</script>
